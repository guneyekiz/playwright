name: CI and Deploy Allure and Playwright Reports to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Scheduled smoke run, every morning. GitHub Actions cron is UTC-only and cannot read
  # workflow_dispatch inputs, so this is a second, separate trigger from the manual one below.
  # 0 12 * * * = 07:00 EST / 08:00 EDT. US Eastern observes DST roughly 8 of 12 months
  # (mid-March to early November), so this cron hits the intended 8am target for most of the
  # year and drifts to 7am only during the ~4 winter months on EST. The alternative, 0 13 * * *,
  # would invert that tradeoff (8am EST / 9am EDT). This is a deliberate choice, not a bug —
  # GitHub Actions schedules cannot express "8am America/New_York" directly.
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment label for the Allure report'
        required: false
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
      test_subset:
        description: 'Which tests to run'
        required: false
        default: 'everything'
        type: choice
        options:
          - everything
          - smoke
          - regression

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    permissions:
      contents: write
      deployments: write
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      BASIC_AUTH_USERNAME: ${{ secrets.BASIC_AUTH_USERNAME }}
      BASIC_AUTH_PASSWORD: ${{ secrets.BASIC_AUTH_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install browsers
        run: npx playwright install

      - name: Clean Allure results and report directories
        run: rm -rf allure-results allure-report && mkdir allure-results allure-report

      # Resolves which --grep tag (if any) the test run step below should apply, and which
      # named subset ("smoke" / "regression" / "everything") this run's reports get nested
      # under in reports/<tool>/<subset>/... below. Same branching for both outputs:
      # - schedule trigger (no inputs available): always forced to @smoke / subset=smoke,
      #   regardless of whatever the workflow_dispatch test_subset default is.
      # - workflow_dispatch with test_subset=smoke/regression: --grep @<that tag>, matching subset.
      # - workflow_dispatch with test_subset=everything (the default), and ordinary push/PR
      #   triggers (which have no inputs at all): no --grep, full suite, subset=everything,
      #   exactly as before.
      - name: Resolve test grep tag
        id: grep-tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          TEST_SUBSET: ${{ github.event.inputs.test_subset }}
        run: |
          if [ "$EVENT_NAME" == "schedule" ]; then
            echo "grep_arg=--grep @smoke" >> "$GITHUB_OUTPUT"
            echo "subset=smoke" >> "$GITHUB_OUTPUT"
          elif [ "$TEST_SUBSET" == "smoke" ]; then
            echo "grep_arg=--grep @smoke" >> "$GITHUB_OUTPUT"
            echo "subset=smoke" >> "$GITHUB_OUTPUT"
          elif [ "$TEST_SUBSET" == "regression" ]; then
            echo "grep_arg=--grep @regression" >> "$GITHUB_OUTPUT"
            echo "subset=regression" >> "$GITHUB_OUTPUT"
          else
            echo "grep_arg=" >> "$GITHUB_OUTPUT"
            echo "subset=everything" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Playwright tests
        # --workers=4 overrides playwright.config.ts's CI default (workers: 1) from the CLI,
        # which takes precedence over the config file. This suite is network-bound (waiting on
        # the remote demo site) rather than CPU-bound, so running above the runner's 2 physical
        # cores (ubuntu-latest) is reasonable despite fullyParallel already being set in config.
        env:
          GREP_ARG: ${{ steps.grep-tag.outputs.grep_arg }}
        run: npx playwright test $GREP_ARG --workers=4
        continue-on-error: true

      - name: Add Allure environment and executor info
        run: |
          cat > allure-results/environment.properties <<EOF
          Environment=${{ github.event.inputs.environment || 'dev' }}
          Base.URL=${{ env.BASE_URL }}
          Browser=chromium
          Node.Version=20
          OS=ubuntu-latest
          EOF
          cat > allure-results/executor.json <<EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "buildOrder": ${{ github.run_number }},
            "buildName": "Run #${{ github.run_number }}",
            "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportName": "Allure Report"
          }
          EOF

      - name: Generate Allure results
        run: npx allure generate allure-results --clean -o allure-report

      - name: Verify Allure report generation
        run: ls -la allure-report

      - name: Generate timestamp
        id: timestamp
        run: echo "timestamp=$(date +%Y-%m-%d__%H%M%S)" >> $GITHUB_ENV

      # Reports are nested under the subset resolved above (smoke/regression/everything) so a
      # scheduled smoke run's report lands in its own tree, separate from regression/everything.
      - name: Create timestamped directories for reports
        env:
          SUBSET: ${{ steps.grep-tag.outputs.subset }}
        run: mkdir -p reports/allure/$SUBSET/${{ env.timestamp }} reports/playwright/$SUBSET/${{ env.timestamp }}

      - name: Copy Playwright report to timestamped directory
        env:
          SUBSET: ${{ steps.grep-tag.outputs.subset }}
        run: cp -r playwright-report/* reports/playwright/$SUBSET/${{ env.timestamp }}

      - name: Copy Allure report to timestamped directory
        env:
          SUBSET: ${{ steps.grep-tag.outputs.subset }}
        run: cp -r allure-report/* reports/allure/$SUBSET/${{ env.timestamp }}

      - name: Verify copied Allure report
        env:
          SUBSET: ${{ steps.grep-tag.outputs.subset }}
        run: ls -la reports/allure/$SUBSET/${{ env.timestamp }}

      - name: Upload Playwright Report Artifact
        uses: actions/upload-artifact@v6
        with:
          name: Playwright Report
          path: reports/playwright/${{ steps.grep-tag.outputs.subset }}/${{ env.timestamp }}

      - name: Upload Allure Report Artifact
        uses: actions/upload-artifact@v6
        with:
          name: Allure Report
          path: reports/allure/${{ steps.grep-tag.outputs.subset }}/${{ env.timestamp }}

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Stash package files to prevent checkout issues
        run: git stash push -- package-lock.json package.json

      - name: Fetch gh-pages branch
        run: git fetch origin gh-pages

      - name: Checkout gh-pages branch
        run: |
          git checkout gh-pages || git checkout --orphan gh-pages
          if [ "$(git rev-parse --abbrev-ref HEAD)" == "gh-pages" ]; then
            git reset --soft origin/gh-pages || true
          fi

      - name: Remove all except index.html and reports directory
        run: |
          sudo chmod -R u+w .
          find . -maxdepth 1 ! -name '.' ! -name '..' ! -name '.git' ! -name 'reports' ! -name 'index.html' -exec rm -rf {} + || true

      # Each subset (smoke/regression/everything) maintains its own independent "latest" —
      # a smoke run only ever touches reports/allure/smoke/latest, never regression/latest or
      # everything/latest, so the scheduled smoke run stops clobbering what "latest" means for
      # the other subsets.
      - name: Update Latest Allure Report
        env:
          SUBSET: ${{ steps.grep-tag.outputs.subset }}
        run: |
          rm -rf reports/allure/$SUBSET/latest
          cp -r reports/allure/$SUBSET/${{ env.timestamp }} reports/allure/$SUBSET/latest

      - name: Update Latest Playwright Report
        env:
          SUBSET: ${{ steps.grep-tag.outputs.subset }}
        run: |
          rm -rf reports/playwright/$SUBSET/latest
          cp -r reports/playwright/$SUBSET/${{ env.timestamp }} reports/playwright/$SUBSET/latest

      # Generalized from the old single-flat-directory version: loops over the three subset
      # subdirectories (smoke/regression/everything) and builds one HTML section per subset,
      # each with its own historical timestamped links. A subset directory may not exist yet
      # (e.g. before the first regression run ever happens) — the ls/grep is guarded so that
      # case produces an empty link list instead of failing the step.
      - name: Generate Report Links for index.html
        id: generate-links
        run: |
          sections=""
          for subset in smoke regression everything; do
            allure_links=$(ls -d reports/allure/$subset/*/ 2>/dev/null | grep -v latest | sed "s|reports/allure/$subset/\(.*\)/|<li><a href=\"reports/allure/$subset/\1/index.html\">\1</a></li>|")
            playwright_links=$(ls -d reports/playwright/$subset/*/ 2>/dev/null | grep -v latest | sed "s|reports/playwright/$subset/\(.*\)/|<li><a href=\"reports/playwright/$subset/\1/index.html\">\1</a></li>|")
            echo "Allure Links ($subset): $allure_links"
            echo "Playwright Links ($subset): $playwright_links"
            section=$(cat <<SECTION
          <h2>$subset</h2>
          <h3>Allure Reports</h3>
          <ul>
            <li><a href="reports/allure/$subset/latest/index.html">Latest Allure Report</a></li>
            $allure_links
          </ul>
          <h3>Playwright Reports</h3>
          <ul>
            <li><a href="reports/playwright/$subset/latest/index.html">Latest Playwright Report</a></li>
            $playwright_links
          </ul>
          SECTION
          )
            sections="$sections
          $section"
          done
          echo "sections<<EOF" >> "$GITHUB_OUTPUT"
          echo "$sections" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Debugging Print Generated Links
        run: |
          echo "Sections: ${{ steps.generate-links.outputs.sections }}"

      - name: Create or Update Root index.html
        run: |
          echo '<!DOCTYPE html>
          <html>
          <head>
            <title>Reports</title>
          </head>
          <body>
            <h1>Reports</h1>
            '"${{ steps.generate-links.outputs.sections }}"'
          </body>
          </html>' > index.html

      - name: Debugging Print Updated index.html
        run: cat index.html

      - name: Commit Allure and Playwright reports to gh-pages
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Deploy reports"
          else
            echo "No changes to commit to gh-pages."
          fi

      - name: Push changes using PAT
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN2 }}
        run: git push -fu https://${ACCESS_TOKEN}@github.com/guneyekiz/playwright gh-pages

      - name: Output Allure report URL
        run: |
         echo "Allure report URL: https://${{ github.repository_owner }}.github.io/${{ github.repository }}/reports/allure/${{ steps.grep-tag.outputs.subset }}/${{ env.timestamp }}/index.html"

      - name: Output Playwright report URL
        run: |
         echo "Playwright report URL: https://${{ github.repository_owner }}.github.io/${{ github.repository }}/reports/playwright/${{ steps.grep-tag.outputs.subset }}/${{ env.timestamp }}/index.html"
