name: CI and Deploy Allure and Playwright Reports to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Scheduled smoke run, every hour. GitHub Actions cron is UTC-only and cannot read
  # workflow_dispatch inputs, so this is a second, separate trigger from the manual one below.
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment label for the Allure report'
        required: false
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
      test_subset:
        description: 'Which tests to run'
        required: false
        default: 'smoke'
        type: choice
        options:
          - smoke
          - regression

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    permissions:
      contents: write
      deployments: write
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      BASIC_AUTH_USERNAME: ${{ secrets.BASIC_AUTH_USERNAME }}
      BASIC_AUTH_PASSWORD: ${{ secrets.BASIC_AUTH_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install browsers
        run: npx playwright install

      - name: Clean Allure results and report directories
        run: rm -rf allure-results allure-report && mkdir allure-results allure-report

      # Resolves which --grep tag this run applies, which capitalized top-level folder
      # ("Smoke" / "Regression") this run's reports get nested under, and which capitalized
      # environment folder ("Dev" / "QA") nests inside that. Every trigger now resolves to
      # exactly one of each — there's no longer an unfiltered "everything" path. Branching:
      # - workflow_dispatch with test_subset=regression: --grep @regression / folder=Regression.
      # - everything else (schedule — no inputs available; ordinary push/PR — no inputs at all;
      #   workflow_dispatch with test_subset=smoke, the default): --grep @smoke / folder=Smoke.
      # - env_folder mirrors the same environment input used for the job's `environment:` key
      #   and environment.properties below (github.event.inputs.environment || 'dev'). QA must
      #   stay a literal uppercase mapping ("qa" -> "QA") rather than generic shell
      #   capitalization (e.g. ${var^}), which would produce "Qa" instead of "QA".
      - name: Resolve test grep tag
        id: grep-tag
        env:
          TEST_SUBSET: ${{ github.event.inputs.test_subset }}
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          if [ "$TEST_SUBSET" == "regression" ]; then
            echo "grep_arg=--grep @regression" >> "$GITHUB_OUTPUT"
            echo "folder=Regression" >> "$GITHUB_OUTPUT"
          else
            echo "grep_arg=--grep @smoke" >> "$GITHUB_OUTPUT"
            echo "folder=Smoke" >> "$GITHUB_OUTPUT"
          fi
          if [ "$ENVIRONMENT" == "qa" ]; then
            echo "env_folder=QA" >> "$GITHUB_OUTPUT"
          else
            echo "env_folder=Dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Playwright tests
        # --workers=4 overrides playwright.config.ts's CI default (workers: 1) from the CLI,
        # which takes precedence over the config file. This suite is network-bound (waiting on
        # the remote demo site) rather than CPU-bound, so running above the runner's 2 physical
        # cores (ubuntu-latest) is reasonable despite fullyParallel already being set in config.
        env:
          GREP_ARG: ${{ steps.grep-tag.outputs.grep_arg }}
        run: npx playwright test $GREP_ARG --workers=4
        continue-on-error: true

      - name: Add Allure environment and executor info
        run: |
          cat > allure-results/environment.properties <<EOF
          Environment=${{ github.event.inputs.environment || 'dev' }}
          Base.URL=${{ env.BASE_URL }}
          Browser=chromium
          Node.Version=20
          OS=ubuntu-latest
          EOF
          cat > allure-results/executor.json <<EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "buildOrder": ${{ github.run_number }},
            "buildName": "Run #${{ github.run_number }}",
            "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportName": "Allure Report"
          }
          EOF

      - name: Generate Allure results
        run: npx allure generate allure-results --clean -o allure-report

      - name: Verify Allure report generation
        run: ls -la allure-report

      - name: Generate timestamp
        id: timestamp
        run: echo "timestamp=$(date +%Y-%m-%d__%H%M%S)" >> $GITHUB_ENV

      # Reports are nested run-folder-first, env-second, tool-third, under the capitalized
      # top-level folder resolved above (Smoke/Regression) and the capitalized environment
      # folder (Dev/QA), so a scheduled smoke run's report lands in its own tree, separate from
      # Regression, and separate from the other environment's runs within the same subset.
      - name: Create timestamped directories for reports
        env:
          FOLDER: ${{ steps.grep-tag.outputs.folder }}
          ENV_FOLDER: ${{ steps.grep-tag.outputs.env_folder }}
        run: mkdir -p reports/$FOLDER/$ENV_FOLDER/${{ env.timestamp }}/allure reports/$FOLDER/$ENV_FOLDER/${{ env.timestamp }}/playwright

      - name: Copy Playwright report to timestamped directory
        env:
          FOLDER: ${{ steps.grep-tag.outputs.folder }}
          ENV_FOLDER: ${{ steps.grep-tag.outputs.env_folder }}
        run: cp -r playwright-report/* reports/$FOLDER/$ENV_FOLDER/${{ env.timestamp }}/playwright

      - name: Copy Allure report to timestamped directory
        env:
          FOLDER: ${{ steps.grep-tag.outputs.folder }}
          ENV_FOLDER: ${{ steps.grep-tag.outputs.env_folder }}
        run: cp -r allure-report/* reports/$FOLDER/$ENV_FOLDER/${{ env.timestamp }}/allure

      - name: Verify copied Allure report
        env:
          FOLDER: ${{ steps.grep-tag.outputs.folder }}
          ENV_FOLDER: ${{ steps.grep-tag.outputs.env_folder }}
        run: ls -la reports/$FOLDER/$ENV_FOLDER/${{ env.timestamp }}/allure

      - name: Upload Playwright Report Artifact
        uses: actions/upload-artifact@v6
        with:
          name: Playwright Report
          path: reports/${{ steps.grep-tag.outputs.folder }}/${{ steps.grep-tag.outputs.env_folder }}/${{ env.timestamp }}/playwright

      - name: Upload Allure Report Artifact
        uses: actions/upload-artifact@v6
        with:
          name: Allure Report
          path: reports/${{ steps.grep-tag.outputs.folder }}/${{ steps.grep-tag.outputs.env_folder }}/${{ env.timestamp }}/allure

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Stash package files to prevent checkout issues
        run: git stash push -- package-lock.json package.json

      - name: Fetch gh-pages branch
        run: git fetch origin gh-pages

      - name: Checkout gh-pages branch
        run: |
          git checkout gh-pages || git checkout --orphan gh-pages
          if [ "$(git rev-parse --abbrev-ref HEAD)" == "gh-pages" ]; then
            git reset --soft origin/gh-pages || true
          fi

      - name: Remove all except index.html and reports directory
        run: |
          sudo chmod -R u+w .
          find . -maxdepth 1 ! -name '.' ! -name '..' ! -name '.git' ! -name 'reports' ! -name 'index.html' -exec rm -rf {} + || true

      # Each top-level folder/environment combination (Smoke/Dev, Smoke/QA, Regression/Dev,
      # Regression/QA) maintains its own independent "latest" — a scheduled smoke/dev run only
      # ever touches reports/Smoke/Dev/latest, never reports/Smoke/QA/latest or anything under
      # Regression, so it never clobbers what "latest" means for the other three combinations.
      - name: Update Latest Allure Report
        env:
          FOLDER: ${{ steps.grep-tag.outputs.folder }}
          ENV_FOLDER: ${{ steps.grep-tag.outputs.env_folder }}
        run: |
          rm -rf reports/$FOLDER/$ENV_FOLDER/latest/allure
          mkdir -p reports/$FOLDER/$ENV_FOLDER/latest
          cp -r reports/$FOLDER/$ENV_FOLDER/${{ env.timestamp }}/allure reports/$FOLDER/$ENV_FOLDER/latest/allure

      - name: Update Latest Playwright Report
        env:
          FOLDER: ${{ steps.grep-tag.outputs.folder }}
          ENV_FOLDER: ${{ steps.grep-tag.outputs.env_folder }}
        run: |
          rm -rf reports/$FOLDER/$ENV_FOLDER/latest/playwright
          mkdir -p reports/$FOLDER/$ENV_FOLDER/latest
          cp -r reports/$FOLDER/$ENV_FOLDER/${{ env.timestamp }}/playwright reports/$FOLDER/$ENV_FOLDER/latest/playwright

      # Loops over the two top-level folders (Smoke/Regression), and within each, over the two
      # environment folders (Dev/QA), building one HTML subsection per combination, each with
      # its own historical timestamped links. Reports are nested run-folder-first, env-second,
      # tool-third: reports/<Folder>/<EnvFolder>/<timestamp>/<allure|playwright>/. A combination
      # may not exist yet (e.g. before the first QA regression run ever happens) — the ls/grep
      # is guarded so that case produces an empty link list instead of failing the step. Note:
      # reports sitting at the older pre-env-split paths (reports/<Folder>/<timestamp>/... with
      # no Dev/QA segment) are not picked up by this loop and so stop appearing in index.html —
      # they remain on gh-pages untouched, just unlinked from the regenerated index.
      - name: Generate Report Links for index.html
        id: generate-links
        run: |
          sections=""
          for folder in Smoke Regression; do
            folder_section="<h2>$folder</h2>"
            for env_folder in Dev QA; do
              allure_links=$(ls -d reports/$folder/$env_folder/*/allure/ 2>/dev/null | grep -v latest | sed "s|reports/$folder/$env_folder/\(.*\)/allure/|<li><a href=\"reports/$folder/$env_folder/\1/allure/index.html\">\1</a></li>|")
              playwright_links=$(ls -d reports/$folder/$env_folder/*/playwright/ 2>/dev/null | grep -v latest | sed "s|reports/$folder/$env_folder/\(.*\)/playwright/|<li><a href=\"reports/$folder/$env_folder/\1/playwright/index.html\">\1</a></li>|")
              echo "Allure Links ($folder/$env_folder): $allure_links"
              echo "Playwright Links ($folder/$env_folder): $playwright_links"
              subsection=$(cat <<SUBSECTION
          <h3>$env_folder</h3>
          <h4>Allure Reports</h4>
          <ul>
            <li><a href="reports/$folder/$env_folder/latest/allure/index.html">Latest Allure Report</a></li>
            $allure_links
          </ul>
          <h4>Playwright Reports</h4>
          <ul>
            <li><a href="reports/$folder/$env_folder/latest/playwright/index.html">Latest Playwright Report</a></li>
            $playwright_links
          </ul>
          SUBSECTION
          )
              folder_section="$folder_section
          $subsection"
            done
            sections="$sections
          $folder_section"
          done
          echo "sections<<EOF" >> "$GITHUB_OUTPUT"
          echo "$sections" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Debugging Print Generated Links
        run: |
          echo "Sections: ${{ steps.generate-links.outputs.sections }}"

      - name: Create or Update Root index.html
        run: |
          echo '<!DOCTYPE html>
          <html>
          <head>
            <title>Reports</title>
          </head>
          <body>
            <h1>Reports</h1>
            '"${{ steps.generate-links.outputs.sections }}"'
          </body>
          </html>' > index.html

      - name: Debugging Print Updated index.html
        run: cat index.html

      - name: Commit Allure and Playwright reports to gh-pages
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Deploy reports"
          else
            echo "No changes to commit to gh-pages."
          fi

      - name: Push changes using PAT
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN2 }}
        run: git push -fu https://${ACCESS_TOKEN}@github.com/guneyekiz/playwright gh-pages

      - name: Output Allure report URL
        run: |
         echo "Allure report URL: https://${{ github.repository_owner }}.github.io/${{ github.repository }}/reports/${{ steps.grep-tag.outputs.folder }}/${{ steps.grep-tag.outputs.env_folder }}/${{ env.timestamp }}/allure/index.html"

      - name: Output Playwright report URL
        run: |
         echo "Playwright report URL: https://${{ github.repository_owner }}.github.io/${{ github.repository }}/reports/${{ steps.grep-tag.outputs.folder }}/${{ steps.grep-tag.outputs.env_folder }}/${{ env.timestamp }}/playwright/index.html"
