name: CI and Deploy Allure and Playwright Reports to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Scheduled smoke run, every hour. GitHub Actions cron is UTC-only and cannot read
  # workflow_dispatch inputs, so this is a second, separate trigger from the manual one below.
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment label for the Allure report'
        required: false
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
      test_subset:
        description: 'Which tests to run'
        required: false
        default: 'smoke'
        type: choice
        options:
          - smoke
          - regression

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    permissions:
      contents: write
      deployments: write
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      BASIC_AUTH_USERNAME: ${{ secrets.BASIC_AUTH_USERNAME }}
      BASIC_AUTH_PASSWORD: ${{ secrets.BASIC_AUTH_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install browsers
        run: npx playwright install

      - name: Clean Allure results and report directories
        run: rm -rf allure-results allure-report && mkdir allure-results allure-report

      # Resolves which --grep tag this run applies, and which capitalized top-level folder
      # ("Smoke" / "Regression") this run's reports get nested under in reports/<folder>/...
      # below. Every trigger now resolves to exactly one of the two — there's no longer an
      # unfiltered "everything" path. Same branching for both outputs:
      # - workflow_dispatch with test_subset=regression: --grep @regression / folder=Regression.
      # - everything else (schedule — no inputs available; ordinary push/PR — no inputs at all;
      #   workflow_dispatch with test_subset=smoke, the default): --grep @smoke / folder=Smoke.
      - name: Resolve test grep tag
        id: grep-tag
        env:
          TEST_SUBSET: ${{ github.event.inputs.test_subset }}
        run: |
          if [ "$TEST_SUBSET" == "regression" ]; then
            echo "grep_arg=--grep @regression" >> "$GITHUB_OUTPUT"
            echo "folder=Regression" >> "$GITHUB_OUTPUT"
          else
            echo "grep_arg=--grep @smoke" >> "$GITHUB_OUTPUT"
            echo "folder=Smoke" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Playwright tests
        # --workers=4 overrides playwright.config.ts's CI default (workers: 1) from the CLI,
        # which takes precedence over the config file. This suite is network-bound (waiting on
        # the remote demo site) rather than CPU-bound, so running above the runner's 2 physical
        # cores (ubuntu-latest) is reasonable despite fullyParallel already being set in config.
        env:
          GREP_ARG: ${{ steps.grep-tag.outputs.grep_arg }}
        run: npx playwright test $GREP_ARG --workers=4
        continue-on-error: true

      - name: Add Allure environment and executor info
        run: |
          cat > allure-results/environment.properties <<EOF
          Environment=${{ github.event.inputs.environment || 'dev' }}
          Base.URL=${{ env.BASE_URL }}
          Browser=chromium
          Node.Version=20
          OS=ubuntu-latest
          EOF
          cat > allure-results/executor.json <<EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "buildOrder": ${{ github.run_number }},
            "buildName": "Run #${{ github.run_number }}",
            "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportName": "Allure Report"
          }
          EOF

      - name: Generate Allure results
        run: npx allure generate allure-results --clean -o allure-report

      - name: Verify Allure report generation
        run: ls -la allure-report

      - name: Generate timestamp
        id: timestamp
        run: echo "timestamp=$(date +%Y-%m-%d__%H%M%S)" >> $GITHUB_ENV

      # Reports are nested run-folder-first, tool-second, under the capitalized top-level
      # folder resolved above (Smoke/Regression), so a scheduled smoke run's report lands in
      # its own tree, separate from Regression.
      - name: Create timestamped directories for reports
        env:
          FOLDER: ${{ steps.grep-tag.outputs.folder }}
        run: mkdir -p reports/$FOLDER/${{ env.timestamp }}/allure reports/$FOLDER/${{ env.timestamp }}/playwright

      - name: Copy Playwright report to timestamped directory
        env:
          FOLDER: ${{ steps.grep-tag.outputs.folder }}
        run: cp -r playwright-report/* reports/$FOLDER/${{ env.timestamp }}/playwright

      - name: Copy Allure report to timestamped directory
        env:
          FOLDER: ${{ steps.grep-tag.outputs.folder }}
        run: cp -r allure-report/* reports/$FOLDER/${{ env.timestamp }}/allure

      - name: Verify copied Allure report
        env:
          FOLDER: ${{ steps.grep-tag.outputs.folder }}
        run: ls -la reports/$FOLDER/${{ env.timestamp }}/allure

      - name: Upload Playwright Report Artifact
        uses: actions/upload-artifact@v6
        with:
          name: Playwright Report
          path: reports/${{ steps.grep-tag.outputs.folder }}/${{ env.timestamp }}/playwright

      - name: Upload Allure Report Artifact
        uses: actions/upload-artifact@v6
        with:
          name: Allure Report
          path: reports/${{ steps.grep-tag.outputs.folder }}/${{ env.timestamp }}/allure

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Stash package files to prevent checkout issues
        run: git stash push -- package-lock.json package.json

      - name: Fetch gh-pages branch
        run: git fetch origin gh-pages

      - name: Checkout gh-pages branch
        run: |
          git checkout gh-pages || git checkout --orphan gh-pages
          if [ "$(git rev-parse --abbrev-ref HEAD)" == "gh-pages" ]; then
            git reset --soft origin/gh-pages || true
          fi

      - name: Remove all except index.html and reports directory
        run: |
          sudo chmod -R u+w .
          find . -maxdepth 1 ! -name '.' ! -name '..' ! -name '.git' ! -name 'reports' ! -name 'index.html' -exec rm -rf {} + || true

      # Each top-level folder (Smoke/Regression) maintains its own independent "latest" —
      # a smoke run only ever touches reports/Smoke/latest, never reports/Regression/latest,
      # so a scheduled smoke run never clobbers what "latest" means for Regression.
      - name: Update Latest Allure Report
        env:
          FOLDER: ${{ steps.grep-tag.outputs.folder }}
        run: |
          rm -rf reports/$FOLDER/latest/allure
          mkdir -p reports/$FOLDER/latest
          cp -r reports/$FOLDER/${{ env.timestamp }}/allure reports/$FOLDER/latest/allure

      - name: Update Latest Playwright Report
        env:
          FOLDER: ${{ steps.grep-tag.outputs.folder }}
        run: |
          rm -rf reports/$FOLDER/latest/playwright
          mkdir -p reports/$FOLDER/latest
          cp -r reports/$FOLDER/${{ env.timestamp }}/playwright reports/$FOLDER/latest/playwright

      # Loops over the two top-level folders (Smoke/Regression) and builds one HTML section
      # per folder, each with its own historical timestamped links. Reports are nested
      # run-folder-first, tool-second: reports/<Folder>/<timestamp>/<allure|playwright>/. A
      # folder may not exist yet (e.g. before the first regression run ever happens) — the
      # ls/grep is guarded so that case produces an empty link list instead of failing the step.
      - name: Generate Report Links for index.html
        id: generate-links
        run: |
          sections=""
          for folder in Smoke Regression; do
            allure_links=$(ls -d reports/$folder/*/allure/ 2>/dev/null | grep -v latest | sed "s|reports/$folder/\(.*\)/allure/|<li><a href=\"reports/$folder/\1/allure/index.html\">\1</a></li>|")
            playwright_links=$(ls -d reports/$folder/*/playwright/ 2>/dev/null | grep -v latest | sed "s|reports/$folder/\(.*\)/playwright/|<li><a href=\"reports/$folder/\1/playwright/index.html\">\1</a></li>|")
            echo "Allure Links ($folder): $allure_links"
            echo "Playwright Links ($folder): $playwright_links"
            section=$(cat <<SECTION
          <h2>$folder</h2>
          <h3>Allure Reports</h3>
          <ul>
            <li><a href="reports/$folder/latest/allure/index.html">Latest Allure Report</a></li>
            $allure_links
          </ul>
          <h3>Playwright Reports</h3>
          <ul>
            <li><a href="reports/$folder/latest/playwright/index.html">Latest Playwright Report</a></li>
            $playwright_links
          </ul>
          SECTION
          )
            sections="$sections
          $section"
          done
          echo "sections<<EOF" >> "$GITHUB_OUTPUT"
          echo "$sections" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Debugging Print Generated Links
        run: |
          echo "Sections: ${{ steps.generate-links.outputs.sections }}"

      - name: Create or Update Root index.html
        run: |
          echo '<!DOCTYPE html>
          <html>
          <head>
            <title>Reports</title>
          </head>
          <body>
            <h1>Reports</h1>
            '"${{ steps.generate-links.outputs.sections }}"'
          </body>
          </html>' > index.html

      - name: Debugging Print Updated index.html
        run: cat index.html

      - name: Commit Allure and Playwright reports to gh-pages
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Deploy reports"
          else
            echo "No changes to commit to gh-pages."
          fi

      - name: Push changes using PAT
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN2 }}
        run: git push -fu https://${ACCESS_TOKEN}@github.com/guneyekiz/playwright gh-pages

      - name: Output Allure report URL
        run: |
         echo "Allure report URL: https://${{ github.repository_owner }}.github.io/${{ github.repository }}/reports/${{ steps.grep-tag.outputs.folder }}/${{ env.timestamp }}/allure/index.html"

      - name: Output Playwright report URL
        run: |
         echo "Playwright report URL: https://${{ github.repository_owner }}.github.io/${{ github.repository }}/reports/${{ steps.grep-tag.outputs.folder }}/${{ env.timestamp }}/playwright/index.html"
